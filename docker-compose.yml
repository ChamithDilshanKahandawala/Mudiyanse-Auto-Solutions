version: '3.8'
services:
  mongo:
    image: mongo:6
    volumes: 
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  rabbit:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./backend/auth-service
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mudiyanse_auth
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  vehicle-service:
    build: ./backend/vehicle-service
    ports:
      - "5002:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mudiyanse_vehicle
      - RABBIT_URL=amqp://rabbit:5672
    depends_on:
      - mongo
      - rabbit

  inventory-service:
    build: ./backend/inventory-service
    ports:
      - "5003:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mudiyanse_inventory
    depends_on:
      - mongo

  order-service:
    build: ./backend/order-service
    ports:
      - "5004:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mudiyanse_orders
      - RABBIT_URL=amqp://rabbit:5672
    depends_on:
      - mongo
      - rabbit

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - auth-service
      - vehicle-service
      - inventory-service
      - order-service

volumes:
  mongo-data: